server:
  port: 8080

spring:
  application:
    name: demo

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    # Por defecto es true, pero es bueno tenerlo explícito
    enabled: true
    # Esto permite que Flyway cree la tabla flyway_schema_history si la DB ya tiene tablas
    baseline-on-migrate: true
    # Ubicación de migraciones para el esquema público (se ejecuta al arrancar la app)
    locations: classpath:db/migration/shared
